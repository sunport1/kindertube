    <!-- APPLICATION CONTROLLER -->
    <script>
        class KinderTubeApp {
            constructor() {
                this.STORAGE_KEY = 'kindertube_local_fallback';

                this.state = {
                    videos: [
                        {
                            id: '50A3eR3z_-s',
                            title: 'Die Sendung mit der Maus - Lach- und Sachgeschichten',
                            category: 'Lernen',
                            addedAt: Date.now()
                        },
                        {
                            id: '8J3R-A3qM-E',
                            title: 'Kikaninchen - Schöne Kinderlieder',
                            category: 'Musik',
                            addedAt: Date.now()
                        }
                    ],
                    categories: ['Alle', 'Zeichentrick', 'Lernen', 'Musik', 'Tiere', 'Sonstiges'],
                    currentCategory: 'Alle',
                    pin: '1234',
                    enteredPin: '',
                    timeLimitMinutes: 45,
                    allowedStartTime: '07:00',
                    allowedEndTime: '19:00',
                    timeUsedTodayMinutes: 0,
                    lastDateStamp: new Date().toDateString()
                };

                this.timerInterval = null;
                this.progressInterval = null;
                this.ytPlayer = null;
                this.isPlaying = false;
                this.user = null;

                this.initYoutubeApi();
                this.initCloud();
            }

            // YouTube Iframe API Laden für programmgesteuerte Player-Kontrolle
            initYoutubeApi() {
                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    const firstScriptTag = document.getElementsByTagName('script')[0];
                    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                }
            }

            // Cloud Firestore Setup & Sync
            async initCloud() {
                this.loadFromLocalFallback();

                const checkFirebase = setInterval(async () => {
                    if (window.firebaseCore) {
                        clearInterval(checkFirebase);
                        const { auth, db, appId, doc, setDoc, onSnapshot, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.firebaseCore;

                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        } catch (err) {
                            console.warn("Auth Fallback:", err);
                        }

                        onAuthStateChanged(auth, (currentUser) => {
                            this.user = currentUser;
                            if (!currentUser) return;

                            const configDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'main_config');

                            onSnapshot(configDocRef, (snapshot) => {
                                if (snapshot.exists()) {
                                    const cloudData = snapshot.data();
                                    if (cloudData.videos) this.state.videos = cloudData.videos;
                                    if (cloudData.pin) this.state.pin = cloudData.pin;
                                    if (cloudData.timeLimitMinutes) this.state.timeLimitMinutes = cloudData.timeLimitMinutes;
                                    if (cloudData.allowedStartTime) this.state.allowedStartTime = cloudData.allowedStartTime;
                                    if (cloudData.allowedEndTime) this.state.allowedEndTime = cloudData.allowedEndTime;

                                    this.saveToLocalFallback();
                                    this.renderCategories();
                                    this.renderVideos();
                                    this.renderAdminVideoList();
                                    this.checkTimeLocks();

                                    document.getElementById('cloudStatusIcon').className = "fa-solid fa-cloud text-green-400 text-[10px]";
                                } else {
                                    this.syncToCloud();
                                }
                            }, (error) => {
                                console.error("Cloud Error:", error);
                                document.getElementById('cloudStatusIcon').className = "fa-solid fa-cloud-slash text-yellow-500 text-[10px]";
                            });
                        });
                    }
                }, 200);

                this.renderCategories();
                this.renderVideos();
                this.startTimerMonitor();
                this.checkTimeLocks();
            }

            async syncToCloud() {
                if (!window.firebaseCore || !this.user) {
                    this.saveToLocalFallback();
                    return;
                }
                const { db, appId, doc, setDoc } = window.firebaseCore;
                const configDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'main_config');

                try {
                    await setDoc(configDocRef, {
                        videos: this.state.videos,
                        pin: this.state.pin,
                        timeLimitMinutes: this.state.timeLimitMinutes,
                        allowedStartTime: this.state.allowedStartTime,
                        allowedEndTime: this.state.allowedEndTime,
                        updatedAt: Date.now()
                    });
                } catch (e) {
                    console.error("Cloud Speicherfehler:", e);
                    this.saveToLocalFallback();
                }
            }

            loadFromLocalFallback() {
                try {
                    const data = localStorage.getItem(this.STORAGE_KEY);
                    if (data) {
                        const parsed = JSON.parse(data);
                        this.state = { ...this.state, ...parsed };
                    }
                } catch (e) {}

                const today = new Date().toDateString();
                if (this.state.lastDateStamp !== today) {
                    this.state.timeUsedTodayMinutes = 0;
                    this.state.lastDateStamp = today;
                    this.saveToLocalFallback();
                }
            }

            saveToLocalFallback() {
                try {
                    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.state));
                } catch (e) {}
            }

            // --- CATEGORY RENDER ---
            renderCategories() {
                const container = document.getElementById('categoryFilterContainer');
                container.innerHTML = '';

                this.state.categories.forEach(cat => {
                    const active = this.state.currentCategory === cat;
                    const btn = document.createElement('button');
                    btn.className = `px-5 py-2.5 rounded-2xl font-bold text-sm whitespace-nowrap transition touch-card ${
                        active 
                        ? 'bg-gradient-to-r from-pink-500 to-yellow-500 text-white shadow-lg' 
                        : 'bg-slate-800 text-slate-300 hover:bg-slate-700'
                    }`;
                    btn.innerText = cat;
                    btn.onclick = () => {
                        this.state.currentCategory = cat;
                        this.renderCategories();
                        this.renderVideos();
                    };
                    container.appendChild(btn);
                });
            }

            // --- VIDEO GRID RENDER ---
            renderVideos() {
                const grid = document.getElementById('videoGrid');
                const emptyState = document.getElementById('emptyState');
                grid.innerHTML = '';

                const filtered = this.state.currentCategory === 'Alle' 
                    ? this.state.videos 
                    : this.state.videos.filter(v => v.category === this.state.currentCategory);

                if (filtered.length === 0) {
                    emptyState.classList.remove('hidden');
                    emptyState.classList.add('flex');
                    return;
                } else {
                    emptyState.classList.add('hidden');
                    emptyState.classList.remove('flex');
                }

                filtered.forEach(video => {
                    const card = document.createElement('div');
                    card.className = 'bg-slate-800 rounded-3xl overflow-hidden border border-slate-700/60 shadow-xl flex flex-col justify-between transition transform hover:-translate-y-1 touch-card cursor-pointer';
                    const thumbUrl = `https://img.youtube.com/vi/${video.id}/hqdefault.jpg`;

                    card.innerHTML = `
                        <div class="relative aspect-video bg-slate-900 overflow-hidden" onclick="app.playVideo('${video.id}')">
                            <img src="${thumbUrl}" alt="${video.title}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/30 flex items-center justify-center opacity-90 transition hover:bg-black/10">
                                <div class="w-14 h-14 bg-pink-500 text-white rounded-2xl flex items-center justify-center shadow-2xl transform hover:scale-110 transition">
                                    <i class="fa-solid fa-play text-2xl ml-1"></i>
                                </div>
                            </div>
                            <span class="absolute top-3 left-3 bg-slate-900/80 backdrop-blur text-xs font-bold px-3 py-1 rounded-lg text-slate-200">
                                ${video.category}
                            </span>
                        </div>
                        <div class="p-4 flex-grow flex flex-col justify-between" onclick="app.playVideo('${video.id}')">
                            <h3 class="font-bold text-white text-base line-clamp-2">${video.title}</h3>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            // --- SICHERER ISOLIERTER VIDEO PLAYER ---
            playVideo(videoId) {
                if (this.isLocked()) {
                    this.showLockScreen();
                    return;
                }

                const video = this.state.videos.find(v => v.id === videoId);
                if (!video) return;

                document.getElementById('playerVideoTitle').innerText = video.title;
                document.getElementById('playerCategoryBadge').innerText = video.category;

                document.getElementById('homeView').classList.add('hidden');
                document.getElementById('playerView').classList.remove('hidden');
                document.getElementById('playerView').classList.add('flex');

                window.scrollTo({ top: 0, behavior: 'smooth' });

                // Falls YT API geladen ist: Verwende YouTube JS Player ohne sichtbare YouTube-Controls
                if (window.YT && window.YT.Player) {
                    if (this.ytPlayer && typeof this.ytPlayer.loadVideoById === 'function') {
                        this.ytPlayer.loadVideoById(videoId);
                    } else {
                        this.ytPlayer = new YT.Player('ytIframe', {
                            videoId: videoId,
                            playerVars: {
                                'autoplay': 1,
                                'controls': 0, // YouTube Standard-Controls KOMPLETT AUSBLENDEN
                                'modestbranding': 1,
                                'rel': 0,
                                'fs': 0,
                                'disablekb': 1,
                                'iv_load_policy': 3,
                                'playsinline': 1
                            },
                            events: {
                                'onStateChange': (e) => this.onPlayerStateChange(e)
                            }
                        });
                    }
                } else {
                    // Fallback iframe embed
                    const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&controls=0&rel=0&modestbranding=1&disablekb=1&iv_load_policy=3`;
                    document.getElementById('ytIframe').src = embedUrl;
                }

                this.startProgressTracker();
            }

            togglePlayPause() {
                if (this.ytPlayer && typeof this.ytPlayer.getPlayerState === 'function') {
                    const state = this.ytPlayer.getPlayerState();
                    if (state === YT.PlayerState.PLAYING) {
                        this.ytPlayer.pauseVideo();
                        this.showPlayStateAnimation('pause');
                    } else {
                        this.ytPlayer.playVideo();
                        this.showPlayStateAnimation('play');
                    }
                }
            }

            showPlayStateAnimation(type) {
                const iconContainer = document.getElementById('playStateIcon');
                const icon = document.getElementById('playStateIconI');

                icon.className = type === 'play' ? "fa-solid fa-play text-3xl ml-1" : "fa-solid fa-pause text-3xl";
                iconContainer.classList.remove('scale-0');
                iconContainer.classList.add('scale-100');

                setTimeout(() => {
                    iconContainer.classList.remove('scale-100');
                    iconContainer.classList.add('scale-0');
                }, 600);
            }

            onPlayerStateChange(event) {
                const btnIcon = document.getElementById('btnPlayPauseIcon');
                const btnText = document.getElementById('btnPlayPauseText');

                if (event.data === YT.PlayerState.PLAYING) {
                    this.isPlaying = true;
                    btnIcon.className = "fa-solid fa-pause text-xl";
                    btnText.innerText = "Pause";
                } else {
                    this.isPlaying = false;
                    btnIcon.className = "fa-solid fa-play text-xl ml-0.5";
                    btnText.innerText = "Abspielen";
                }
            }

            seekRelative(seconds) {
                if (this.ytPlayer && typeof this.ytPlayer.getCurrentTime === 'function') {
                    const curr = this.ytPlayer.getCurrentTime();
                    this.ytPlayer.seekTo(curr + seconds, true);
                }
            }

            onSeekInput(val) {
                if (this.ytPlayer && typeof this.ytPlayer.getDuration === 'function') {
                    const dur = this.ytPlayer.getDuration();
                    if (dur > 0) {
                        const targetSec = (val / 100) * dur;
                        this.ytPlayer.seekTo(targetSec, true);
                    }
                }
            }

            startProgressTracker() {
                if (this.progressInterval) clearInterval(this.progressInterval);

                this.progressInterval = setInterval(() => {
                    if (this.ytPlayer && typeof this.ytPlayer.getCurrentTime === 'function') {
                        const curr = this.ytPlayer.getCurrentTime() || 0;
                        const dur = this.ytPlayer.getDuration() || 0;

                        if (dur > 0) {
                            const pct = (curr / dur) * 100;
                            document.getElementById('customProgressBar').value = pct;
                            document.getElementById('currentTimeText').innerText = this.formatTime(curr);
                            document.getElementById('durationText').innerText = this.formatTime(dur);
                        }
                    }
                }, 500);
            }

            formatTime(seconds) {
                const s = Math.floor(seconds || 0);
                const mins = Math.floor(s / 60);
                const secs = s % 60;
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }

            showHome() {
                if (this.progressInterval) clearInterval(this.progressInterval);
                if (this.ytPlayer && typeof this.ytPlayer.stopVideo === 'function') {
                    this.ytPlayer.stopVideo();
                } else {
                    document.getElementById('ytIframe').src = '';
                }
                
                document.getElementById('playerView').classList.add('hidden');
                document.getElementById('playerView').classList.remove('flex');
                document.getElementById('homeView').classList.remove('hidden');
            }

            // --- TIME MONITOR & LOCKOUT SYSTEM ---
            startTimerMonitor() {
                if (this.timerInterval) clearInterval(this.timerInterval);

                this.timerInterval = setInterval(() => {
                    this.state.timeUsedTodayMinutes += (1 / 60);
                    this.saveToLocalFallback();
                    this.checkTimeLocks();
                }, 1000);
            }

            checkTimeLocks() {
                const now = new Date();
                const currentMinutesToday = now.getHours() * 60 + now.getMinutes();

                const [startH, startM] = this.state.allowedStartTime.split(':').map(Number);
                const [endH, endM] = this.state.allowedEndTime.split(':').map(Number);

                const startLimitMinutes = startH * 60 + startM;
                const endLimitMinutes = endH * 60 + endM;

                const isOutsideTimeWindow = currentMinutesToday < startLimitMinutes || currentMinutesToday > endLimitMinutes;
                const isLimitExceeded = this.state.timeUsedTodayMinutes >= this.state.timeLimitMinutes;

                const remaining = Math.max(0, Math.floor(this.state.timeLimitMinutes - this.state.timeUsedTodayMinutes));
                document.getElementById('remainingTimeText').innerText = `${remaining} Min`;

                if (isOutsideTimeWindow || isLimitExceeded) {
                    if (isOutsideTimeWindow) {
                        document.getElementById('lockScreenTitle').innerText = 'Außerhalb der Sehzeit';
                        document.getElementById('lockScreenMessage').innerText = `Videos sind nur zwischen ${this.state.allowedStartTime} Uhr und ${this.state.allowedEndTime} Uhr freigeschaltet.`;
                    } else {
                        document.getElementById('lockScreenTitle').innerText = 'Tageslimit Erreicht!';
                        document.getElementById('lockScreenMessage').innerText = `Die freigegebene Bildschirmzeit von ${this.state.timeLimitMinutes} Minuten für heute ist abgelaufen.`;
                    }
                    this.showLockScreen();
                } else {
                    this.hideLockScreen();
                }
            }

            isLocked() {
                const now = new Date();
                const currentMinutesToday = now.getHours() * 60 + now.getMinutes();
                const [startH, startM] = this.state.allowedStartTime.split(':').map(Number);
                const [endH, endM] = this.state.allowedEndTime.split(':').map(Number);
                
                const outsideWindow = currentMinutesToday < (startH * 60 + startM) || currentMinutesToday > (endH * 60 + endM);
                const limitExceeded = this.state.timeUsedTodayMinutes >= this.state.timeLimitMinutes;
                return outsideWindow || limitExceeded;
            }

            showLockScreen() {
                this.showHome();
                document.getElementById('lockScreen').classList.remove('hidden');
            }

            hideLockScreen() {
                document.getElementById('lockScreen').classList.add('hidden');
            }

            // --- ADMIN & PIN CONTROL ---
            openAdminModal() {
                this.state.enteredPin = '';
                this.updatePinDots();
                document.getElementById('pinError').classList.add('hidden');
                document.getElementById('pinState').classList.remove('hidden');
                document.getElementById('adminPanelState').classList.add('hidden');
                document.getElementById('adminModal').classList.remove('hidden');
            }

            closeAdminModal() {
                document.getElementById('adminModal').classList.add('hidden');
            }

            pressPin(num) {
                if (this.state.enteredPin.length < 4) {
                    this.state.enteredPin += num;
                    this.updatePinDots();
                }

                if (this.state.enteredPin.length === 4) {
                    if (this.state.enteredPin === this.state.pin) {
                        this.unlockAdminPanel();
                    } else {
                        document.getElementById('pinError').classList.remove('hidden');
                        setTimeout(() => this.clearPin(), 800);
                    }
                }
            }

            clearPin() {
                this.state.enteredPin = '';
                this.updatePinDots();
                document.getElementById('pinError').classList.add('hidden');
            }

            backspacePin() {
                this.state.enteredPin = this.state.enteredPin.slice(0, -1);
                this.updatePinDots();
            }

            updatePinDots() {
                const dotsContainer = document.getElementById('pinDots');
                const len = this.state.enteredPin.length;
                dotsContainer.innerHTML = '';

                for (let i = 0; i < 4; i++) {
                    const dot = document.createElement('div');
                    dot.className = `w-4 h-4 rounded-full border-2 border-indigo-500 ${i < len ? 'bg-indigo-500' : 'bg-transparent'}`;
                    dotsContainer.appendChild(dot);
                }
            }

            unlockAdminPanel() {
                document.getElementById('pinState').classList.add('hidden');
                document.getElementById('adminPanelState').classList.remove('hidden');
                
                document.getElementById('inputStartTime').value = this.state.allowedStartTime;
                document.getElementById('inputEndTime').value = this.state.allowedEndTime;
                document.getElementById('inputDailyLimit').value = this.state.timeLimitMinutes;

                this.renderAdminVideoList();
            }

            switchAdminTab(tab) {
                if (tab === 'videos') {
                    document.getElementById('adminTabVideos').classList.remove('hidden');
                    document.getElementById('adminTabSettings').classList.add('hidden');
                    document.getElementById('tabBtnVideos').className = "pb-3 font-bold border-b-2 border-indigo-500 text-indigo-400";
                    document.getElementById('tabBtnSettings').className = "pb-3 font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200";
                } else {
                    document.getElementById('adminTabVideos').classList.add('hidden');
                    document.getElementById('adminTabSettings').classList.remove('hidden');
                    document.getElementById('tabBtnVideos').className = "pb-3 font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200";
                    document.getElementById('tabBtnSettings').className = "pb-3 font-bold border-b-2 border-indigo-500 text-indigo-400";
                }
            }

            extractYtId(urlOrId) {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = urlOrId.match(regExp);
                return (match && match[2].length === 11) ? match[2] : urlOrId.trim();
            }

            handleAddVideo(e) {
                e.preventDefault();
                const rawUrl = document.getElementById('inputYtUrl').value;
                const title = document.getElementById('inputTitle').value;
                const category = document.getElementById('inputCategory').value;

                const videoId = this.extractYtId(rawUrl);

                if (!videoId || videoId.length < 5) {
                    alert('Ungültige YouTube URL oder Video ID');
                    return;
                }

                const newVideo = {
                    id: videoId,
                    title: title,
                    category: category,
                    addedAt: Date.now()
                };

                this.state.videos.unshift(newVideo);
                this.syncToCloud();

                document.getElementById('inputYtUrl').value = '';
                document.getElementById('inputTitle').value = '';

                this.renderAdminVideoList();
                this.renderVideos();
            }

            deleteVideo(videoId) {
                this.state.videos = this.state.videos.filter(v => v.id !== videoId);
                this.syncToCloud();
                this.renderAdminVideoList();
                this.renderVideos();
            }

            renderAdminVideoList() {
                const container = document.getElementById('adminVideoList');
                document.getElementById('adminVideoCount').innerText = this.state.videos.length;
                container.innerHTML = '';

                this.state.videos.forEach(v => {
                    const row = document.createElement('div');
                    row.className = 'flex items-center justify-between p-3 bg-slate-800 rounded-xl border border-slate-700/50';
                    row.innerHTML = `
                        <div class="flex items-center space-x-3 overflow-hidden">
                            <img src="https://img.youtube.com/vi/${v.id}/default.jpg" class="w-12 h-9 object-cover rounded-md flex-shrink-0">
                            <div class="truncate">
                                <p class="font-bold text-sm text-slate-200 truncate">${v.title}</p>
                                <span class="text-xs text-indigo-400">${v.category}</span>
                            </div>
                        </div>
                        <button onclick="app.deleteVideo('${v.id}')" class="text-red-400 hover:text-red-300 p-2 rounded-lg hover:bg-slate-700">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    `;
                    container.appendChild(row);
                });
            }

            saveTimeSettings() {
                const start = document.getElementById('inputStartTime').value;
                const end = document.getElementById('inputEndTime').value;
                const limit = parseInt(document.getElementById('inputDailyLimit').value, 10);

                if (!start || !end || isNaN(limit)) {
                    alert('Bitte alle Felder korrekt ausfüllen');
                    return;
                }

                this.state.allowedStartTime = start;
                this.state.allowedEndTime = end;
                this.state.timeLimitMinutes = limit;

                this.syncToCloud();
                this.checkTimeLocks();
                this.closeAdminModal();
            }

            updatePin() {
                const newPin = document.getElementById('inputNewPin').value;
                if (newPin && newPin.length === 4 && !isNaN(newPin)) {
                    this.state.pin = newPin;
                    this.syncToCloud();
                    document.getElementById('inputNewPin').value = '';
                    alert('Neue PIN wurde in der Cloud gespeichert!');
                } else {
                    alert('Die PIN muss genau 4 Zahlen enthalten.');
                }
            }
        }

        let app;
        window.addEventListener('DOMContentLoaded', () => {
            app = new KinderTubeApp();
        });
    </script>
</body>
</html>
